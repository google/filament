name: 'Auto-close .github edits'

# This workflow automatically closes pull requests from external contributors
# that attempt to modify files within the .github directory.
#
# We use 'pull_request_target' because it runs in the context of the base
# repository, granting it the necessary permissions to close PRs from forks.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  auto-close:
    runs-on: ubuntu-latest
    # Only run for external contributors.
    # author_association values like 'OWNER', 'MEMBER', and 'COLLABORATOR'
    # represent internal/trusted contributors with write access.
    if: >
      github.event.pull_request.author_association != 'OWNER' &&
      github.event.pull_request.author_association != 'MEMBER' &&
      github.event.pull_request.author_association != 'COLLABORATOR'
    steps:
      - name: Check for .github changes
        id: check_files
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const touchedGithub = files.some(f => f.filename.startsWith('.github/'));
            core.setOutput('touched_github', touchedGithub);

      - name: Close and Comment
        if: steps.check_files.outputs.touched_github == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          cat << 'EOF' > comment.txt
          Thank you for your contribution. To maintain the security and stability of our CI/CD pipelines, modifications to the `.github` directory are restricted to project maintainers.

          As a result, this Pull Request has been automatically closed. If you have suggestions for improvements or bug fixes related to our GitHub configuration, please open an issue to discuss them with the team first. We appreciate your understanding.
          EOF
          gh pr comment "$PR_NUMBER" --body-file comment.txt
          gh pr close "$PR_NUMBER"
