name: 'Auto-close .github edits'

# This workflow automatically closes pull requests from external contributors
# that attempt to modify files within the .github directory.
#
# We use 'pull_request_target' because it runs in the context of the base
# repository, granting it the necessary permissions to close PRs from forks.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-close:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-close PR if it touches .github
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: context.payload.pull_request.user.login,
            });
            const isMaintainer = ['admin', 'maintain', 'write'].includes(permission.permission);

            if (isMaintainer) {
              console.log(`User ${context.payload.pull_request.user.login} is a maintainer. Skipping check.`);
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
            });

            const touchedGithub = files.some(f => f.filename.startsWith('.github/'));

            if (touchedGithub) {
              const body = 'Thank you for your contribution. To maintain the security and stability of our CI/CD pipelines, modifications to the `.github` directory are restricted to project maintainers.\n\n' +
                'As a result, this Pull Request has been automatically closed. If you have suggestions for improvements or bug fixes related to our GitHub configuration, please open an issue to discuss them with the team first. We appreciate your understanding.';

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body,
              });

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number,
                state: 'closed',
              });

              console.log(`Closed PR #${pull_number} because it touched the .github directory.`);
            }
