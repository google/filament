<!DOCTYPE html>
<html lang="en">
<head>
<title>Filament Viewer</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1">
<link href="https://google.github.io/filament/favicon.png" rel="icon" type="image/x-icon" />
<link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet">
<style>
html, body {
    height: 100%;
    margin: 0;
}

main {
    max-width: 800px;
    font-family: "Open Sans";
    margin: auto;
    padding: 10px;
}

filament-viewer {
    width: 100%;
    height: 600px;
    border: none;
}

canvas {
    border: solid 2px gray;
    border-radius: 10px;
    background: #D9D9D9; /* This is consistent with the default clear color. */
    width: 100%;
    height: 100%;
    position: absolute;
}


</style>
</head>
<body>
<main>

<p>
<filament-viewer
    enableDrop="true"
    ibl="../helmet/default_env/default_env_ibl.ktx"
    intensity="20000">
    <!--
         Note that the canvas must be in the light dom so that emscripten's webgpu binding can find
         it. Id must match the id defined in viewer.js.
       --->
    <canvas id="filament-viewer-canvas" slot="output-area"></canvas
</filament-viewer>
</p>

</main>
<script src="../filament.js"></script>
<script src="viewer.js" type="module"></script>
</body>
</html>
